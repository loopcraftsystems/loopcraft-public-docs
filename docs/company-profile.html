  <script id="md" type="application/json">"# LoopCraft Systems — Company Profile\n\n---\n\n## Identity\n\n**Legal name:** LoopCraft OÜ  \n**Trading name:** LoopCraft Systems  \n**Incorporated:** Estonia (e-Residency)  \n**Operations:** Ambilly, France (EU)  \n**Email:** hello@loopcraftsystems.com  \n**Website:** loopcraftsystems.com  \n**LinkedIn:** linkedin.com/company/loopcraftsystems\n\n---\n\n## What We Do\n\nLoopCraft Systems is a boutique AI automation and ITSM consultancy for EU organisations. We eliminate operational friction using our Centralize → Automate → Visualize methodology — building custom workflows, AI agent pipelines, and operations dashboards on EU-hosted open-source infrastructure.\n\nWe specialize in two markets:\n1. **EU public sector** — digital transformation, ITSM modernization, and NIS2 compliance automation under Digital Europe Programme funding\n2. **EU SMEs (10–150 employees)** — sales automation, operations efficiency, and client delivery systems\n\n---\n\n## What We Are NOT\n\n- A SaaS product\n- A mass-market template provider\n- A staffing or body-shopping firm\n- A US-first company patching GDPR on top\n\n---\n\n## Core Differentiators\n\n| Differentiator | What it Means |\n|---------------|--------------|\n| EU-native | Built for GDPR, hosted in EU, understands Digital Europe funding |\n| AI-powered ops | OpenClaw agent OS runs our own operations — we eat our own cooking |\n| Methodology-led | Same rigorous 3-phase approach on every engagement |\n| Boutique delivery | Founder-led, no account managers, direct expertise on every project |\n| Tender intelligence | Only automation consultancy with a dedicated EU procurement intelligence system |\n\n---\n\n## Proof Points\n\n- **Project 01:** Content engine automation — 8–12 hours/week saved, consistent publishing, data-driven insights\n- **OpenClaw:** Our AI agent OS automates our own tender scanning, outreach, invoicing, and content — demonstrably at scale\n\n---\n\n## Services Summary\n\n| Service | Price | Delivery |\n|---------|-------|---------|\n| Starter — AI Readiness Audit | Pricing on request | 2 weeks |\n| Growth Essential — AI-Native Implementation | Pricing on request | 4–6 weeks |\n| Growth Full — AI-Native Implementation (full) | Pricing on request | 6–8 weeks |\n| Scale — AI Operations Retainer | Pricing on request | Ongoing |\n| EU Tender Win Package | Pricing on request | Per tender |\n\n*Detailed pricing is for internal use only — see `04-finance/pricing-tiers.md` (canonical v2).*\n\n---\n\n## Target Revenue\n\n**€1,000,000 by November 2026**  \nPrimary path: Consulting sprints + EU tender contracts  \nSecondary: Retainers from delivered clients\n"</script>
