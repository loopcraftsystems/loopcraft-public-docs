  <script id="md" type="application/json">"# LOOP Framework© — LoopCraft Systems Proprietary Methodology\n\n**Version:** 2.0 | **Owner:** LoopCraft Systems OÜ | **Classification:** Public\n\n---\n\n## What Is LOOP?\n\nLOOP is LoopCraft's four-phase methodology for delivering AI-native operational transformation. Every engagement — from a Starter Audit to a full Growth implementation — follows the same loop, calibrated to scope.\n\nUnlike waterfall delivery or generic \"agile sprints,\" LOOP is designed for **operations-first AI adoption**: the goal is a self-improving, autonomous business system — not a one-time technology deployment.\n\n---\n\n## The Four Phases\n\n### L — Listen & Learn\n*Duration: 1–5 days depending on tier*\n\nWe start by listening — to the business, not the brief.\n\n**What we do:**\n- 90-minute structured discovery session with the founder/ops lead\n- Map every manual process consuming >2 hours/week\n- Identify the 3 highest-leverage automation opportunities (by ROI × feasibility)\n- Audit current tool stack for integration potential\n- Document the \"AS-IS\" state in a shareable process map\n\n**Deliverables:**\n- AI Maturity Scorecard (12 dimensions, 0–100)\n- Process automation opportunity map (ranked by effort vs. impact)\n- Tool stack compatibility assessment\n- 90-day Quick Wins shortlist\n\n**Why it matters:** Most engagements fail because they start building before they understand. LISTEN forces clarity before any technology decision is made.\n\n---\n\n### O — Orchestrate & Optimise\n*Duration: 3–7 days depending on tier*\n\nWe design the target system before writing a single line of code.\n\n**What we do:**\n- Design the agent architecture (which agent owns which workflow)\n- Map data flows: input → processing → output → memory\n- Define integration points (CRM, email, calendar, Supabase, Stripe, n8n)\n- Write the automation specification: trigger, condition, action, memory write\n- Prototype the 2 highest-priority workflows in a sandbox n8n environment\n- Review with client → iterate until the design is signed off\n\n**Deliverables:**\n- Agent architecture diagram (hub-and-spoke with ARIA as orchestrator)\n- Automation specification document (one page per workflow)\n- Data flow map\n- Prototype demo recording\n- Signed-off design document (change requests after this point are billable)\n\n**Why it matters:** Orchestration is the competitive moat. Anyone can build a chatbot. Building a self-coordinating agent workforce that improves over time is the LOOP difference.\n\n---\n\n### O — Operate & Automate\n*Duration: 5–21 days depending on tier*\n\nWe build and deploy the agreed system — no scope creep, no feature additions.\n\n**What we do:**\n- Build all agreed n8n workflows (each follows the Karpathy loop: MODIFY → VERIFY → KEEP/DISCARD → COMPILE)\n- Deploy agent memory layer (Supabase `agent_memory` table)\n- Connect all integrations (Telegram/Slack interface, email, calendar, CRM)\n- Build operator dashboard (Next.js — real-time agent status, task log, memory viewer)\n- Execute 3 full test runs per workflow before handover\n- Document every workflow with: trigger, steps, edge cases, rollback procedure\n\n**Deliverables:**\n- Live production environment (Vercel + Supabase + n8n)\n- All workflow JSON files (importable, version-controlled in GitHub)\n- Operator dashboard with credentials\n- Test run report (3× per workflow)\n- Workflow documentation pack\n\n**Why it matters:** Deployment without documentation is technical debt. Every LoopCraft build ships with full handover materials so the client can operate independently — or upgrade to a retainer.\n\n---\n\n### P — Prove & Perpetuate\n*Duration: Ongoing / 30 days post-launch minimum*\n\nWe measure, compile, and improve — closing the loop.\n\n**What we do:**\n- Define 3–5 KPIs tied to business outcomes (not vanity metrics)\n- Connect analytics layer (PostHog events, Supabase queries, LEDGER P&L)\n- Week 1 post-launch: daily check-in, hotfixes same-day\n- Week 2–4: weekly review against KPIs, minor optimisations included\n- Month 2+: monthly KPI report + roadmap update (retainer clients only)\n- Quarterly: full system review, competitive benchmark, roadmap upgrade\n\n**Deliverables:**\n- KPI dashboard (live, shareable link)\n- Week 1 health report\n- Monthly performance report (retainer)\n- Quarterly strategy brief (retainer)\n- Memory compilation: every KEEP writes to Pinecone for compounding improvement\n\n**Why it matters:** The P phase is where the ROI compounds. A system that learns from every interaction, every week, is worth 10× more than a static deployment. PERPETUATE is how LoopCraft clients get exponential returns.\n\n---\n\n## The Karpathy Autonomous Loop (Internal)\n\nEvery agent in LoopCraft's workforce runs a micro-loop on every task:\n\n```\nMODIFY → VERIFY → KEEP / DISCARD → COMPILE → REPEAT\n```\n\n- **MODIFY:** Agent executes the task, produces an output\n- **VERIFY:** Output is checked against success criteria\n- **KEEP:** Output passes → write to memory (Supabase + Pinecone)\n- **DISCARD:** Output fails → log failure reason, retry with adjusted prompt\n- **COMPILE:** Weekly: condense all KEEPs into knowledge articles (ARIA `/wiki` command)\n\nThis means LoopCraft's agents get smarter every week. After 90 days, the system has institutional memory that would take a human 2–3 years to accumulate.\n\n---\n\n## LOOP by Service Tier\n\n| Phase | Starter (Audit) | Growth Essential | Growth Full | Scale (Retainer) |\n|-------|----------------|-----------------|-------------|-----------------|\n| Listen | ✅ Full | ✅ Full | ✅ Full | ✅ Ongoing |\n| Orchestrate | Summary only | ✅ Full design | ✅ Full + architecture | ✅ Continuous |\n| Operate | ❌ Not included | ❌ Not included | ✅ Up to 5 workflows | ✅ Up to 20 workflows |\n| Prove | Quick wins report | KPI framework | 30-day monitoring | Ongoing + quarterly |\n\n---\n\n## How to Use This Document\n\n**In proposals:** Reference LOOP to differentiate from competitors. \"We don't just build automations — we deliver a LOOP-certified AI operating system.\"\n\n**In tenders:** LOOP is the methodology section of every ESPD technical proposal. It demonstrates structured delivery, risk management, and measurable outcomes.\n\n**With clients:** Walk through the four phases in the discovery call. Most clients have never seen a methodology this specific — it builds instant credibility.\n\n**Trademark note:** LOOP Framework© is proprietary to LoopCraft Systems OÜ. Do not share the internal Karpathy loop detail with clients — reference it as \"continuous improvement architecture\" in external materials.\n"</script>
