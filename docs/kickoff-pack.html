  <script id="md" type="application/json">"# Client Kickoff Pack Template\n**Owner:** FORGE | **Version:** 1.0 | **Updated:** 2026-06-30\n\n> Fill in every `[VARIABLE]` before sending. Variables are in CAPS. Review gate: Anton must approve before sending to client.\n\n---\n\n## SECTION 1 — Welcome Letter\n\n**Subject:** Welcome to LoopCraft — [CLIENT NAME] engagement starts today\n\n---\n\nHi [PRIMARY CONTACT NAME],\n\nWe're delighted to formally begin your [SERVICE TIER] engagement with LoopCraft Systems OÜ.\n\n**What happens next:**\n\nBy end of Week 1:\n- Your dedicated agent workspace is provisioned (Telegram + Supabase)\n- Discovery session completed — your process map is live\n- ARIA running your daily briefing in your Telegram\n\nBy end of Week [DELIVERY WEEK]:\n- [DELIVERABLE 1]\n- [DELIVERABLE 2]\n- [DELIVERABLE 3]\n\n**Your single point of contact:** Anton Farias — hello@loopcraftsystems.com\n**Response SLA:** [SLA FROM CONTRACT — 48h standard / 4h critical]\n**Your project dashboard:** [VERCEL URL — provision before sending]\n\nEverything else is handled by the agent team. You'll know what's happening every morning.\n\nWarm regards,\nAnton Farias\nFounder, LoopCraft Systems OÜ\nhello@loopcraftsystems.com\n\n---\n\n## SECTION 2 — Project Overview\n\n| Field | Value |\n|---|---|\n| Client | [CLIENT NAME] |\n| Service tier | [Starter / Growth Essential / Growth Full / Scale / Tender] |\n| Contract value | [€X,XXX] |\n| Start date | [DATE] |\n| Delivery deadline | [DATE] |\n| MSA signed | [DATE] |\n| SOW reference | SOW-[YYYY-NNN] |\n| Payment terms | 7 days from invoice |\n| Payment schedule | [e.g. 50% upfront / 50% on delivery] |\n\n### Contracted Deliverables\n\n| # | Deliverable | Due | Owner |\n|---|---|---|---|\n| 1 | [DELIVERABLE] | Week [N] | FORGE |\n| 2 | [DELIVERABLE] | Week [N] | FORGE |\n| 3 | [DELIVERABLE] | Week [N] | FORGE |\n| 4 | [DELIVERABLE] | Week [N] | FORGE |\n| 5 | Documentation + handover | Final week | FORGE |\n\n---\n\n## SECTION 3 — LOOP Phase Plan\n\n### Phase L — Listen & Learn (Days 1–5)\n\n**Goal:** Map every process, score automation potential, set baseline AI maturity score.\n\n| Day | Activity | Owner | Client action needed? |\n|---|---|---|---|\n| Day 1 | Kickoff call (60 min) — agenda below | Anton | JOIN |\n| Day 1 | Access provisioning (Telegram, shared folder, tool logins) | CORE | SEND CREDENTIALS |\n| Day 2–3 | Process interviews (up to 3 team members, 30 min each) | Anton | COORDINATE INTERVIEWS |\n| Day 4 | Process map draft + automation scoring | FORGE | Review draft |\n| Day 5 | AI Maturity Score baseline (12 dimensions) | FORGE | Review score |\n\n**Week 1 deliverable:** Process Opportunity Map + AI Maturity Score → client approves before Phase O begins.\n\n---\n\n### Phase O — Orchestrate (Days 6–10)\n\n**Goal:** Design the full agent architecture before writing a single line of automation.\n\n| Day | Activity | Owner |\n|---|---|---|\n| Day 6–7 | Agent architecture design — which agents, which tasks, what memory layer | FORGE |\n| Day 8 | Architecture review call (30 min) — present design, get sign-off | Anton |\n| Day 9–10 | n8n workflow skeleton + Supabase schema design | CORE |\n\n**Gate: No build begins without written client sign-off on the architecture.**\n\n---\n\n### Phase O — Operate (Days 11–[END WEEK])\n\n**Goal:** Build in production. Ship one workflow, validate, ship the next.\n\n| Sprint | Workflows | Milestone |\n|---|---|---|\n| Sprint 1 (Days 11–15) | [WF1, WF2] | First live workflow demo |\n| Sprint 2 (Days 16–20) | [WF3, WF4, WF5] | Full automation stack running |\n| Sprint 3 (Days 21–25) | [WF6–WF10] | All workflows + dashboard live |\n\n**Progress updates:** FORGE sends a Telegram update every Friday. Weekly sprint review call (30 min) every Friday at [TIME CET].\n\n---\n\n### Phase P — Prove (Final Week)\n\n**Goal:** Measure everything. Document everything. Hand it over.\n\n| Day | Activity | Owner |\n|---|---|---|\n| Day [N] | 30-day baseline vs. after comparison | LEDGER |\n| Day [N+1] | Full documentation finalised (operator guide, agent prompts, workflow map) | FORGE |\n| Day [N+2] | Staff training session (up to 2 hours) | Anton |\n| Day [N+3] | Acceptance sign-off + final invoice | Anton |\n| Day [N+3] | Post-launch support period begins (30 days) | ECHO |\n\n---\n\n## SECTION 4 — Kickoff Call Agenda (Day 1, 60 min)\n\n**Attendees:** Anton (LoopCraft) + [CLIENT PRIMARY CONTACT] + [CLIENT TECHNICAL CONTACT if applicable]\n\n| Time | Topic | Notes |\n|---|---|---|\n| 00:00–00:05 | Introductions | — |\n| 00:05–00:15 | Engagement overview — what we're building, why, and how | Anton presents |\n| 00:15–00:30 | Process walkthrough — client explains current workflow in detail | Client leads |\n| 00:30–00:45 | Tool access + credentials | CORE provisions live during call |\n| 00:45–00:55 | Communication protocol — Telegram setup, SLAs, escalation path | — |\n| 00:55–01:00 | First-week tasks + next call date | Confirm Day 4 review call |\n\n**Call recording:** Yes (with consent). Recording goes to shared folder [LINK].\n\n---\n\n## SECTION 5 — Access Provisioning Checklist\n\nCORE completes this checklist on Day 1. All access confirmed before kickoff call ends.\n\n### LoopCraft provisions to client:\n- [ ] Telegram group created: `LoopCraft × [CLIENT NAME]`\n- [ ] Shared Google Drive folder: `clients/[CLIENT-SLUG]/`\n- [ ] Project dashboard URL: `[VERCEL URL]`\n- [ ] SOW + MSA documents added to shared folder\n- [ ] Welcome email sent (Section 1 above)\n\n### Client provides to LoopCraft:\n- [ ] Tool credentials for systems to be automated: [LIST TOOLS]\n- [ ] Read access to existing data sources: [LIST]\n- [ ] Technical contact name + Telegram handle\n- [ ] Billing contact + email for invoices\n- [ ] Signed acceptance of GDPR data processing addendum (in MSA)\n\n---\n\n## SECTION 6 — Communication Protocol\n\n| Channel | Use | SLA |\n|---|---|---|\n| Telegram group | Day-to-day questions, progress updates, approvals | [SLA FROM CONTRACT] |\n| Email | Formal communications, invoices, contracts | 24h |\n| Weekly call | Sprint reviews, blockers, strategy | Fridays [TIME] CET |\n| Dashboard | Async progress tracking, agent outputs | Live |\n\n**Escalation path:** Telegram message tagged `@urgent` → Anton responds within 2h on business days.\n\n**Out-of-scope requests:** Any request outside the contracted SOW is logged as a change request (CR). FORGE sends a CR form within 24h with timeline + cost impact.\n\n---\n\n## SECTION 7 — Post-Launch Support (30 days)\n\nIncluded in every engagement tier:\n\n| Item | Detail |\n|---|---|\n| Bug fixes | Covered — unlimited during 30-day window |\n| Workflow adjustments (minor) | Covered — up to 4h of adjustments total |\n| Agent prompt tuning | Covered |\n| New workflow builds | Not covered — requires new SOW |\n| Staff re-training sessions | 1 session included (1h) |\n| SLA during support period | Same as engagement SLA |\n\nAfter 30 days: transition to Scale retainer (€5,500/month) or close-of-engagement.\n\n---\n\n## SECTION 8 — Invoice Schedule\n\n| Invoice | Amount | Due | Trigger |\n|---|---|---|---|\n| Invoice 1 | 50% of total (€[X]) | Day 1 | Contract signing |\n| Invoice 2 | 50% of total (€[X]) | Delivery day | Acceptance sign-off |\n\nAll invoices: 7-day payment terms. Late payment: 1.5% per month after 30 days.\n\nInvoice format: LoopCraft Systems OÜ → [CLIENT LEGAL NAME] → Stripe payment link or bank transfer.\n\n---\n\n## FORGE Agent Notes (internal — do not send to client)\n\n```\nKickoff checklist:\n[ ] SOW reference assigned (SOW-YYYY-NNN)\n[ ] Project folder created in Google Drive\n[ ] Telegram group created\n[ ] Vercel project provisioned (or existing dashboard linked)\n[ ] Supabase project created (if new — use branch for dev)\n[ ] SHIELD reviewed contract for compliance flags\n[ ] LEDGER created invoice schedule in Stripe\n[ ] ECHO added client to health tracking\n[ ] First Friday sprint review call booked in calendar\n[ ] ARIA has client context in agent_memory\n```\n\n**Memory write after kickoff:**\n`! pwsh scripts/memory-write.ps1 -Agent \"FORGE\" -Key \"kickoff_[CLIENT_SLUG]\" -Summary \"Kickoff completed for [CLIENT NAME]. [SERVICE TIER]. Start date [DATE]. Primary contact [NAME].\" -Outcome \"success\"`\n"</script>
