  <script id="md" type="application/json">"# NIS2 Alignment — Positioning Document\n\n**Owner:** SHIELD  \n**Purpose:** How LoopCraft positions against NIS2 requirements in proposals and tenders\n\n---\n\n## NIS2 Overview (For Proposals)\n\nThe NIS2 Directive (EU 2022/2555) entered into force October 2024. It significantly expands the scope of cybersecurity obligations for EU organisations, including:\n\n- **Essential entities:** Energy, transport, health, water, digital infrastructure\n- **Important entities:** Manufacturing, postal, food, chemicals, waste, digital providers\n\nKey requirements relevant to automation consulting:\n1. Risk management measures (Article 21)\n2. Incident reporting within 24h (Article 23)\n3. Supply chain security measures\n4. Business continuity and crisis management\n5. Use of multi-factor authentication and encryption\n\n---\n\n## How LoopCraft Addresses NIS2 in Deliverables\n\n| NIS2 Requirement | LoopCraft Automation Solution |\n|-----------------|-------------------------------|\n| Incident detection and logging | Automated monitoring workflows with Supabase audit logs |\n| 24h incident reporting | n8n workflow triggers immediate notifications + prepopulated report templates |\n| Supply chain risk | Vendor monitoring workflows — automated risk scoring of third-party suppliers |\n| Access control | Automated access review workflows — flag inactive accounts, generate audit reports |\n| Business continuity | Automated backup validation, recovery testing checklists, runbooks |\n| Multi-factor enforcement | Integration checks with IAM systems (Active Directory, Okta) |\n\n---\n\n## Tender Positioning Language\n\nUse this in proposals and tenders for NIS2-covered organisations:\n\n> \"LoopCraft Systems delivers NIS2-aligned automation solutions that transform compliance obligations into operating workflows. Rather than treating NIS2 as a checklist, we build the automation layer that makes compliance continuous: automated incident detection, real-time audit logging, supply chain monitoring, and access review — all on EU-hosted infrastructure, GDPR by design.\"\n\n---\n\n## NIS2 Service Add-On (Optional SOW Module)\n\n**Module name:** NIS2 Compliance Automation Pack  \n**Pricing:** Included in Growth tiers or scoped as Change Request — see `04-finance/pricing-tiers.md`  \n**Includes:**\n- Incident detection and automated reporting workflow\n- Access review automation (monthly report generation)\n- Supply chain vendor risk monitoring\n- Business continuity runbook template + quarterly review workflow\n\n---\n\n## SHIELD Check — NIS2 Relevant Sectors\n\nBefore every proposal, confirm if client sector is covered:\n\n**Essential entities:**\n- [ ] Energy (electricity, oil, gas, hydrogen)\n- [ ] Transport (air, rail, water, road)\n- [ ] Banking and financial market infrastructure\n- [ ] Health sector (hospitals, pharmaceutical)\n- [ ] Water supply\n- [ ] Digital infrastructure (DNS, cloud, data centers)\n- [ ] Public administration (central and regional)\n- [ ] Space\n\n**Important entities:**\n- [ ] Postal and courier\n- [ ] Waste management\n- [ ] Chemicals\n- [ ] Food\n- [ ] Manufacturing (medical devices, computers, machinery, vehicles)\n- [ ] Digital providers (search engines, online marketplaces, social networks)\n\nIf covered → include NIS2 language in proposal + recommend NIS2 module add-on.\n"</script>
