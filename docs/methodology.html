  <script id="md" type="application/json">"# LoopCraft Delivery Methodology\n\n## Centralize → Automate → Visualize\n\n---\n\n## Phase 1: CENTRALIZE\n\n**Goal:** Map all inputs, data sources, and manual touchpoints in the target process.\n\n**Activities:**\n1. Process audit workshop (2h, async or live) — map current state with client\n2. Tool inventory — what systems are involved (CRM, helpdesk, spreadsheets, email)\n3. Data flow diagram — where does data enter, transform, and exit\n4. Friction identification — exact steps that are manual, slow, or error-prone\n5. Prioritization matrix — impact vs. effort for each automation opportunity\n\n**Output:** Friction Map + Automation Roadmap document  \n**Duration:** 3–5 days (L phase of LOOP Framework©)\n**Tier:** Starter — AI Readiness Audit (see `04-finance/pricing-tiers.md`)\n\n---\n\n## Phase 2: AUTOMATE\n\n**Goal:** Build, test, and deploy the automation layer.\n\n**Activities:**\n1. Architecture design — n8n workflow blueprint signed off by client\n2. Credential setup — API keys, OAuth, webhook endpoints\n3. Core workflow build — logic, routing, error handling\n4. AI layer integration — Claude API for drafting, scoring, or enrichment\n5. Staging test — end-to-end with synthetic data\n6. Edge case handling — null values, API timeouts, rate limits\n7. Client UAT — 3 business days of parallel running\n\n**Output:** Live workflows in client's n8n instance + full documentation  \n**Duration:** 4–8 weeks depending on tier\n**Tier:** Growth Essential or Growth Full (see `04-finance/pricing-tiers.md`)\n\n---\n\n## Phase 3: VISUALIZE\n\n**Goal:** Give the client real-time visibility and the ability to manage and iterate.\n\n**Activities:**\n1. Dashboard build — Supabase + Metabase or custom Next.js view\n2. KPI definition — what metrics prove the automation is working\n3. Alert configuration — Slack/email notifications for failures or anomalies\n4. Runbook creation — step-by-step doc for client team to manage the system\n5. Video walkthroughs — Loom recordings for every workflow\n6. Handoff session — 2h live session with client team\n\n**Output:** Dashboard, runbook, video docs, handoff certificate  \n**Duration:** 5 business days (included in Growth tiers — see `04-finance/pricing-tiers.md`)\n\n---\n\n## Full Engagement Timeline\n\n| Week | Phase | Key Milestone |\n|------|-------|--------------|\n| 1 | Centralize | Friction map delivered |\n| 2–3 | Automate | Workflows in staging |\n| 4 | Automate (UAT) | Client UAT complete |\n| 5 | Visualize | Dashboard live |\n| 6 | Enablement | Handoff complete |\n\n---\n\n## Quality Standards\n\n- Every workflow has error handling — no silent failures\n- Every automation runs for 5 business days in parallel before fully replacing manual process\n- Client receives: runbook + Loom walkthrough + emergency contact for 30 days post-launch\n- All data EU-hosted — Supabase Frankfurt, no US-based storage of PII\n"</script>
